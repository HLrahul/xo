# fly.toml - Nakama Backend Configuration
app = "rahul-xo-backend"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  NAMA_PORT = "7350"

[processes]
  app = "/nakama/nakama --config /nakama/data/local.yml --database.address postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME} --socket.server_key ${SOCKET_SERVER_KEY} --session.encryption_key ${SESSION_ENCRYPTION_KEY}"

[http_service]
  internal_port = 7350
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[services]]
  internal_port = 7350
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.concurrency]]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

# Health check to ensure Nakama is ready
[[services.http_checks]]
  interval = "10s"
  grace_period = "5s"
  method = "get"
  path = "/health"
  protocol = "http"
  timeout = "2s"
  tls_skip_verify = false
